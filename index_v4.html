<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Adson">
<link rel="manifest" href="manifest.json">
<title>Adson Cleaning Co</title>
<style>
:root{--navy:#111111;--navy2:#1c1c1c;--teal:#8a8a8a;--teal2:#c0c0c0;--teal3:#f0f0f0;--gold:#c0c0c0;--white:#fff;--bg:#f2f2f2;--grey1:#e0e0e0;--grey2:#999999;--grey3:#666666;--red:#cc3333;--r:12px;--r2:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--navy);min-height:100vh;padding-bottom:80px;max-width:480px;margin:0 auto}
.hdr{background:var(--navy);padding:16px 16px 0;position:sticky;top:0;z-index:100}
.hdr-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:12px}
.logo{height:42px;object-fit:contain}
.hdr-r{text-align:right}
.hdr-site{font-size:11px;color:var(--grey2);letter-spacing:.5px;text-transform:uppercase}
.badge{display:inline-block;background:var(--teal);color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:4px}
.tabs{display:flex;background:var(--navy2)}
.tab{flex:1;padding:10px 0 9px;font-size:12px;font-weight:600;color:var(--grey2);text-align:center;cursor:pointer;border-bottom:2px solid transparent;letter-spacing:.3px}
.tab.on{color:var(--teal2);border-bottom-color:var(--teal2)}
.page{display:none;padding:14px 14px 0}
.page.on{display:block}
.card{background:#fff;border-radius:var(--r);padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.ct{font-size:10px;font-weight:700;color:var(--grey3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--teal);flex-shrink:0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
label{display:block;font-size:10px;font-weight:600;color:var(--grey3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
select,input[type=date],input[type=time]{width:100%;border:1.5px solid var(--grey1);border-radius:var(--r2);padding:9px 11px;font-size:14px;color:var(--navy);background:#fff;-webkit-appearance:none;outline:none;font-family:inherit}
select:focus,input:focus{border-color:var(--teal)}
textarea{width:100%;border:1.5px solid var(--grey1);border-radius:var(--r2);padding:9px 11px;font-size:13px;color:var(--navy);background:#fff;outline:none;font-family:inherit;resize:none;height:80px}
textarea:focus{border-color:var(--teal)}
.slbl{font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:1px;padding:8px 0 4px;border-bottom:1px solid var(--grey1);margin-bottom:2px}
.ci{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--grey1);gap:12px;cursor:pointer;user-select:none}
.ci:last-child{border-bottom:none}
.ci:active{background:var(--teal3);margin:0 -16px;padding:11px 16px}
.cb{width:24px;height:24px;border-radius:6px;border:2px solid var(--grey2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.cb.on{background:var(--teal);border-color:var(--teal)}
.cb.on::after{content:'';width:5px;height:9px;border-right:2px solid #fff;border-bottom:2px solid #fff;transform:rotate(45deg) translateY(-1px);display:block}
.clbl{font-size:14px;flex:1;line-height:1.3}
.clbl.done{color:var(--grey2);text-decoration:line-through}
.pw{background:var(--grey1);border-radius:4px;height:6px;margin-bottom:6px;overflow:hidden}
.pb{height:100%;background:var(--teal);border-radius:4px;transition:width .3s}
.pl{font-size:11px;color:var(--grey3);text-align:right}
.photo-area{border:2px dashed var(--grey1);border-radius:var(--r2);padding:20px;text-align:center;cursor:pointer}
.photo-area .ic{font-size:28px;margin-bottom:4px}
.photo-area p{font-size:13px;color:var(--grey3)}
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.pt{width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px;display:block}
.prw{position:relative}
.prm{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.btn{display:block;width:100%;padding:15px;border-radius:var(--r);font-size:15px;font-weight:700;border:none;cursor:pointer;letter-spacing:.3px;margin-bottom:10px;font-family:inherit}
.btn:active{opacity:.85;transform:scale(.98)}
.btn-p{background:var(--teal);color:#fff}
.btn-n{background:var(--navy);color:#fff}
.btn-o{background:transparent;color:var(--teal);border:2px solid var(--teal)}
.btn-d{background:var(--red);color:#fff}
.vc{background:#fff;border-radius:var(--r);padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);cursor:pointer}
.vh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.vd{font-size:13px;font-weight:700}
.vs{font-size:12px;color:var(--grey3)}
.vbg{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px}
.ok{background:var(--teal3);color:#555}
.par{background:#fff8e1;color:#b8860b}
.vstats{font-size:12px;color:var(--grey3);display:flex;gap:12px}
.vnote{font-size:12px;color:var(--grey3);margin-top:6px;font-style:italic;border-top:1px solid var(--grey1);padding-top:6px}
.srow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.sb{background:#fff;border-radius:var(--r2);padding:12px 10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.sn{font-size:22px;font-weight:800;color:var(--navy);line-height:1}
.sl{font-size:10px;color:var(--grey3);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:16px 20px 40px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto}
.handle{width:36px;height:4px;background:var(--grey1);border-radius:2px;margin:0 auto 14px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:300;white-space:nowrap}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:40px 20px;color:var(--grey3)}
.sync-bar{font-size:11px;color:var(--grey2);text-align:center;padding:6px 0;background:#fff;border-bottom:1px solid var(--grey1)}
.copy-box{background:var(--navy);color:#fff;border-radius:var(--r2);padding:14px;font-size:13px;line-height:1.8;font-family:monospace;white-space:pre-wrap;margin-top:8px}
</style>
</head>

  <div style="height:16px"></div>
</div>

<div class="page" id="pg-history">
  <div id="history-list"></div>
</div>

<div class="page" id="pg-report">
  <div class="card">
    <div class="ct"><span class="dot"></span>Monthly Report</div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <select id="r-month" style="flex:1">
        <option value="0">January</option><option value="1">February</option>
        <option value="2">March</option><option value="3">April</option>
        <option value="4">May</option><option value="5">June</option>
        <option value="6">July</option><option value="7">August</option>
        <option value="8">September</option><option value="9">October</option>
        <option value="10">November</option><option value="11">December</option>
      </select>
      <select id="r-year" style="width:90px"></select>
    </div>
    <button class="btn btn-n" onclick="genReport()">Generate Report</button>
  </div>
  <div id="report-out" style="display:none"></div>
</div>

<div class="overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBEm5vcb6r3UdzcTAmmZ9iFyuuT1zMr8H4",
  authDomain: "adson-cleaning.firebaseapp.com",
  databaseURL: "https://adson-cleaning-default-rtdb.firebaseio.com",
  projectId: "adson-cleaning",
  storageBucket: "adson-cleaning.firebasestorage.app",
  messagingSenderId: "207031622000",
  appId: "1:207031622000:web:f8c65d1ef52cf6dafb57b5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const visitsRef = ref(db, 'adson/visits');

window._fbSave = function(visits) {
  const bar = document.getElementById('sync-bar');
  bar.style.display = 'block';
  set(visitsRef, visits).then(() => {
    bar.style.display = 'none';
  }).catch(() => {
    bar.style.display = 'none';
  });
};

onValue(visitsRef, (snapshot) => {
  const data = snapshot.val();
  if (data === null) {
    window._visits = [];
  } else if (Array.isArray(data)) {
    window._visits = data.filter(v => v !== null);
  } else if (typeof data === 'object') {
    window._visits = Object.values(data).filter(v => v !== null);
  } else {
    window._visits = [];
  }
  window._visits.sort((a, b) => (b.id || 0) - (a.id || 0));
  window._dataReady = true;
  // Dispatch event so the main script can react
  window.dispatchEvent(new CustomEvent('visitsUpdated'));
});
</script>

<script>
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const TUE=[
  {s:"BATHROOMS ×3",t:["Mop floors","Wipe toilets & basins","Empty bins","Refill consumables (soap, TP, paper towel)"]},
  {s:"KITCHENS ×2",t:["Wipe benches & appliances","Mop Workshop kitchen floor","Empty bins"]},
  {s:"STAIRS & ENTRY",t:["Broom / vacuum / mop"]},
  {s:"UPSTAIRS COFFEE BAR",t:["Wipe down benches & appliances","Mop floors","Empty bins"]},
  {s:"OFFICE",t:["Empty office bins"]},
];
const FRI=[
  {s:"BATHROOMS ×3",t:["Mop floors","Wipe toilets & basins","Empty bins","Refill consumables (soap, TP, paper towel)"]},
  {s:"KITCHENS ×2",t:["Wipe benches & appliances","Mop Office kitchen floor","Empty bins"]},
  {s:"STAIRS & ENTRY",t:["Broom / vacuum / mop"]},
  {s:"UPSTAIRS COFFEE BAR",t:["Wipe down benches & appliances","Mop floors","Empty bins"]},
  {s:"OFFICE",t:["Vacuum","Empty office bins"]},
];

window._visits = [];
window._dataReady = false;
window.addEventListener('visitsUpdated', function() {
  renderHistory();
});
let checked={};
let photos=[];
let modalIdx=null;

function getVisits(){ return window._visits || []; }

function today(){return new Date().toISOString().split("T")[0]}
function nowT(){return new Date().toTimeString().slice(0,5)}
function fmtD(d,o){return new Date(d+"T12:00:00").toLocaleDateString("en-AU",o)}

function init(){
  const d=new Date();
  document.getElementById("v-date").value=today();
  document.getElementById("v-start").value=nowT();
  document.getElementById("v-day").value=d.getDay()===2?"Tuesday":"Friday";
  document.getElementById("day-badge").textContent=document.getElementById("v-day").value;
  buildChecklist();
  const ry=document.getElementById("r-year");
  for(let y=d.getFullYear();y>=d.getFullYear()-2;y--){
    const o=document.createElement("option");o.value=y;o.textContent=y;ry.appendChild(o);
  }
  document.getElementById("r-month").value=d.getMonth();
}

function showTab(name,el){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("on"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  document.getElementById("pg-"+name).classList.add("on");
  el.classList.add("on");
  if(name==="history")renderHistory();
}

function onDayChange(){
  document.getElementById("day-badge").textContent=document.getElementById("v-day").value;
  checked={};
  buildChecklist();
}

function buildChecklist(){
  const day=document.getElementById("v-day").value;
  const secs=day==="Tuesday"?TUE:FRI;
  const el=document.getElementById("checklist");
  el.innerHTML="";
  checked={};
  secs.forEach(sec=>{
    const sl=document.createElement("div");sl.className="slbl";sl.textContent=sec.s;el.appendChild(sl);
    sec.t.forEach(task=>{
      const k=sec.s+"|"+task;
      checked[k]=false;
      const row=document.createElement("div");row.className="ci";row.onclick=()=>toggle(k);
      const box=document.createElement("div");box.className="cb";box.id="cb-"+btoa(k).replace(/[^a-zA-Z0-9]/g,"");
      const lbl=document.createElement("div");lbl.className="clbl";lbl.id="cl-"+btoa(k).replace(/[^a-zA-Z0-9]/g,"");lbl.textContent=task;
      row.appendChild(box);row.appendChild(lbl);el.appendChild(row);
    });
  });
  updateProg();
}

function toggle(k){
  checked[k]=!checked[k];
  const id=btoa(k).replace(/[^a-zA-Z0-9]/g,"");
  document.getElementById("cb-"+id).classList.toggle("on",checked[k]);
  document.getElementById("cl-"+id).classList.toggle("done",checked[k]);
  updateProg();
}

function updateProg(){
  const keys=Object.keys(checked);
  const done=keys.filter(k=>checked[k]).length;
  const pct=keys.length?Math.round(done/keys.length*100):0;
  document.getElementById("prog").style.width=pct+"%";
  document.getElementById("prog-lbl").textContent=done+" of "+keys.length+" tasks completed";
}

function addPhotos(e){
  Array.from(e.target.files).forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{photos.push(ev.target.result);renderPhotoGrid();};
    r.readAsDataURL(f);
  });
  e.target.value="";
}

function renderPhotoGrid(){
  const g=document.getElementById("ph-grid");g.innerHTML="";
  photos.forEach((src,i)=>{
    const w=document.createElement("div");w.className="prw";
    const img=document.createElement("img");img.src=src;img.className="pt";
    const btn=document.createElement("button");btn.className="prm";btn.textContent="×";
    btn.onclick=ev=>{ev.stopPropagation();photos.splice(i,1);renderPhotoGrid();};
    w.appendChild(img);w.appendChild(btn);g.appendChild(w);
  });
}

function saveVisit(){
  const date=document.getElementById("v-date").value;
  if(!date){showToast("Please select a date");return;}
  const keys=Object.keys(checked);
  const done=keys.filter(k=>checked[k]);
  const notDone=keys.filter(k=>!checked[k]);
  const v={id:Date.now(),day:document.getElementById("v-day").value,date,startTime:document.getElementById("v-start").value,endTime:document.getElementById("v-end").value,notes:document.getElementById("v-notes").value.trim(),done,notDone,total:keys.length,photos:[...photos]};
  const updated=[v,...getVisits()];
  window._visits=updated;
  if(window._fbSave) window._fbSave(updated);
  photos=[];renderPhotoGrid();
  document.getElementById("v-notes").value="";
  const nd=new Date(date+"T12:00:00");
  const isT=v.day==="Tuesday";
  nd.setDate(nd.getDate()+(isT?3:4));
  document.getElementById("v-date").value=nd.toISOString().split("T")[0];
  document.getElementById("v-day").value=isT?"Friday":"Tuesday";
  onDayChange();
  showToast("Visit saved ✓");
}

function renderHistory(){
  const visits=getVisits();
  const el=document.getElementById("history-list");
  if(!visits.length){el.innerHTML='<div class="empty"><div style="font-size:36px;margin-bottom:10px">📋</div><p>No visits logged yet</p></div>';return;}
  el.innerHTML="";
  visits.forEach((v,i)=>{
    const ok=v.notDone.length===0;
    const card=document.createElement("div");card.className="vc";card.onclick=()=>openModal(i);
    const ds=fmtD(v.date,{weekday:"short",day:"numeric",month:"short",year:"numeric"});
    const time=v.startTime?(v.startTime+(v.endTime?"–"+v.endTime:"")):"";
    let h=`<div class="vh"><div><div class="vd">${v.day}</div><div class="vs">${ds}${time?" · "+time:""}</div></div><span class="vbg ${ok?"ok":"par"}">${ok?"Complete":v.done.length+"/"+v.total}</span></div>`;
    h+=`<div class="vstats"><span>✓ ${v.done.length} done</span>${v.notDone.length?"<span>⚠ "+v.notDone.length+" skipped</span>":""}${v.photos&&v.photos.length?"<span>📷 "+v.photos.length+"</span>":""}</div>`;
    if(v.notes)h+=`<div class="vnote">${v.notes}</div>`;
    card.innerHTML=h;el.appendChild(card);
  });
}

function openModal(idx){
  modalIdx=idx;
  const v=getVisits()[idx];
  const ds=fmtD(v.date,{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  let h=`<div style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:2px">${v.day} Clean</div>`;
  h+=`<div style="font-size:12px;color:var(--grey3);margin-bottom:14px">${ds}${v.startTime?" · "+v.startTime+(v.endTime?"–"+v.endTime:""):""}</div>`;
  if(v.done.length){
    h+=`<div class="ct" style="margin-bottom:6px"><span class="dot"></span>Completed</div>`;
    v.done.forEach(k=>h+=`<div style="font-size:13px;padding:3px 0;color:var(--teal)">✓ ${k.split("|")[1]}</div>`);
  }
  if(v.notDone.length){
    h+=`<div class="ct" style="margin-bottom:6px;margin-top:12px"><span class="dot" style="background:var(--red)"></span>Skipped</div>`;
    v.notDone.forEach(k=>h+=`<div style="font-size:13px;padding:3px 0;color:var(--red)">✗ ${k.split("|")[1]}</div>`);
  }
  if(v.notes){
    h+=`<div class="ct" style="margin-bottom:6px;margin-top:12px"><span class="dot" style="background:var(--gold)"></span>Notes</div>`;
    h+=`<div style="font-size:13px;color:var(--grey3);font-style:italic">${v.notes}</div>`;
  }
  if(v.photos&&v.photos.length){
    h+=`<div class="ct" style="margin-bottom:8px;margin-top:12px"><span class="dot"></span>Photos</div><div style="display:flex;gap:6px;flex-wrap:wrap">`;
    v.photos.forEach(src=>h+=`<img src="${src}" style="width:70px;height:70px;object-fit:cover;border-radius:8px">`);
    h+="</div>";
  }
  h+=`<div style="height:14px"></div><button class="btn btn-d" onclick="delVisit()">Delete Visit</button>`;
  document.getElementById("modal-body").innerHTML=h;
  document.getElementById("modal").classList.add("on");
}

function closeModal(){document.getElementById("modal").classList.remove("on");}

function delVisit(){
  if(modalIdx===null)return;
  const updated=getVisits().filter((_,i)=>i!==modalIdx);
  window._visits=updated;
  if(window._fbSave) window._fbSave(updated);
  closeModal();renderHistory();showToast("Visit deleted");
}

function genReport(){
  const visits=getVisits();
  const month=parseInt(document.getElementById("r-month").value);
  const year=parseInt(document.getElementById("r-year").value);
  const mv=visits.filter(v=>{const d=new Date(v.date+"T12:00:00");return d.getMonth()===month&&d.getFullYear()===year;}).sort((a,b)=>a.date.localeCompare(b.date));
  const tot=mv.reduce((s,v)=>s+v.total,0);
  const done=mv.reduce((s,v)=>s+v.done.length,0);
  const pct=tot?Math.round(done/tot*100):0;
  const mn=MONTHS[month]+" "+year;

  let h=`<div class="srow">
    <div class="sb"><div class="sn">${mv.length}</div><div class="sl">Visits</div></div>
    <div class="sb"><div class="sn">${done}</div><div class="sl">Tasks Done</div></div>
    <div class="sb"><div class="sn">${pct}%</div><div class="sl">Completion</div></div>
  </div>`;

  if(!mv.length){
    h+='<div class="card"><div style="font-size:13px;color:var(--grey3)">No visits recorded for this month.</div></div>';
  } else {
    mv.forEach(v=>{
      const ds=fmtD(v.date,{weekday:"long",day:"numeric",month:"long"});
      const time=v.startTime?(v.startTime+(v.endTime?" – "+v.endTime:"")):"";
      const ok=v.notDone.length===0;
      h+=`<div class="card">`;
      h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">`;
      h+=`<div><div style="font-size:14px;font-weight:700;color:var(--navy)">${v.day}</div>`;
      h+=`<div style="font-size:12px;color:var(--grey3)">${ds}</div>`;
      if(time)h+=`<div style="font-size:12px;color:var(--grey3)">${time}</div>`;
      h+=`</div><span class="vbg ${ok?"ok":"par"}">${ok?"✓ Complete":v.done.length+"/"+v.total}</span></div>`;
      const sections=v.day==="Tuesday"?TUE:FRI;
      sections.forEach(sec=>{
        const secDone=v.done.filter(k=>k.startsWith(sec.s+"|")).map(k=>k.split("|")[1]);
        const secSkipped=v.notDone.filter(k=>k.startsWith(sec.s+"|")).map(k=>k.split("|")[1]);
        if(!secDone.length&&!secSkipped.length)return;
        h+=`<div style="font-size:10px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:1px;padding:8px 0 4px;border-bottom:1px solid var(--grey1);margin-bottom:4px">${sec.s}</div>`;
        secDone.forEach(t=>h+=`<div style="font-size:13px;padding:3px 0;color:var(--teal);display:flex;align-items:center;gap:8px"><span style="font-size:11px;font-weight:700">✓</span>${t}</div>`);
        secSkipped.forEach(t=>h+=`<div style="font-size:13px;padding:3px 0;color:var(--red);display:flex;align-items:center;gap:8px"><span style="font-size:11px;font-weight:700">✗</span>${t}</div>`);
      });
      if(v.notes){
        h+=`<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--grey1)">`;
        h+=`<div style="font-size:10px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px">⚠ Notes</div>`;
        h+=`<div style="font-size:13px;color:var(--grey3);font-style:italic">${v.notes}</div></div>`;
      }
      if(v.photos&&v.photos.length)h+=`<div style="margin-top:8px;font-size:12px;color:var(--grey3)">📷 ${v.photos.length} photo${v.photos.length>1?"s":""} attached</div>`;
      h+=`</div>`;
    });
  }

  const issues=mv.filter(v=>v.notes);
  const copyText="Service Report — "+mn+"\nClient: TechSpan Building Systems\nVisits completed: "+mv.length+"\nTasks completed: "+done+" / "+tot+" ("+pct+"%)\n"+(issues.length?"Issues noted: "+issues.length:"No issues noted");
  h+=`<div class="card"><div class="ct"><span class="dot"></span>Invoice Email Summary</div><div style="font-size:12px;color:var(--grey3);margin-bottom:8px">Copy and paste into your monthly invoice email to David:</div><div class="copy-box" id="copy-text">${copyText}</div><button class="btn btn-o" style="margin-top:10px" onclick="copyReport()">Copy Summary</button></div>`;

  const el=document.getElementById("report-out");
  el.innerHTML=h;el.style.display="block";
  el.scrollIntoView({behavior:"smooth"});
}

function copyReport(){
  const el=document.getElementById("copy-text");
  if(navigator.clipboard){navigator.clipboard.writeText(el.textContent).then(()=>showToast("Copied ✓"));}
  else{const r=document.createRange();r.selectNode(el);window.getSelection().removeAllRanges();window.getSelection().addRange(r);document.execCommand("copy");showToast("Copied ✓");}
}

function showToast(msg){
  const t=document.getElementById("toast");t.textContent=msg;t.classList.add("on");
  setTimeout(()=>t.classList.remove("on"),2500);
}

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}

init();
</script>
